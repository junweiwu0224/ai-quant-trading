services:
  dashboard:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
      - MIMO_API_KEY=${MIMO_API_KEY:-}
      - MIMO_BASE_URL=${MIMO_BASE_URL:-https://token-plan-cn.xiaomimimo.com/v1}
      - MIMO_MODEL=${MIMO_MODEL:-mimo-v2.5}
    restart: unless-stopped

  paper:
    build: .
    command: ["python", "scripts/run_paper.py", "-s", "dual_ma", "-c", "000001", "-c", "600519"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
    profiles:
      - trading

  live:
    build: .
    command: ["python", "scripts/run_live.py", "-s", "dual_ma", "-c", "000001"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
    profiles:
      - trading

  backtest:
    build: .
    command: ["python", "scripts/run_backtest.py", "-s", "dual_ma", "-c", "000001"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
    profiles:
      - trading
