services:
  dashboard:
    build: .
    ports:
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./dashboard/templates:/app/dashboard/templates
      - ./dashboard/static:/app/dashboard/static
    environment:
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://cpa.junwei.fun/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.5}
    restart: unless-stopped

  paper:
    build: .
    command: ["python", "scripts/run_paper.py", "-s", "dual_ma", "-c", "000001", "-c", "600519"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
    profiles:
      - trading

  live:
    build: .
    command: ["python", "scripts/run_live.py", "-s", "dual_ma", "-c", "000001"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
    profiles:
      - trading

  backtest:
    build: .
    command: ["python", "scripts/run_backtest.py", "-s", "dual_ma", "-c", "000001"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
    profiles:
      - trading
