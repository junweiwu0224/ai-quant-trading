services:
  openclaw:
    image: node:24-alpine
    working_dir: /app
    command:
      - sh
      - -lc
      - |
        npm install -g /app/openclaw-2026.5.20.tgz &&
        mkdir -p /data/openclaw/state /data/openclaw/workspace &&
        cat > /data/openclaw/openclaw.json <<'EOF'
        {
          "gateway": {
            "mode": "local",
            "port": 18789,
            "bind": "0.0.0.0",
            "auth": { "mode": "token" },
            "http": {
              "endpoints": {
                "chatCompletions": { "enabled": true },
                "responses": { "enabled": true }
              }
            }
          },
          "agents": {
            "defaults": {
              "workspace": "/data/openclaw/workspace"
            }
          }
        }
        EOF
        : "$${OPENCLAW_API_KEY:?Set OPENCLAW_API_KEY before starting OpenClaw gateway}" &&
        OPENCLAW_CONFIG_PATH=/data/openclaw/openclaw.json OPENCLAW_STATE_DIR=/data/openclaw/state openclaw gateway run --port 18789 --auth token --token "$${OPENCLAW_API_KEY}" --allow-unconfigured
    expose:
      - "18789"
    volumes:
      - ./openclaw-2026.5.20.tgz:/app/openclaw-2026.5.20.tgz:ro
      - ./data/openclaw:/data/openclaw
      - ./logs/openclaw:/logs/openclaw
    environment:
      - TZ=Asia/Shanghai
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_API_KEY:-}
      - OPENCLAW_WORKSPACE_DIR=/data/openclaw
    restart: unless-stopped

  dashboard:
    build: .
    ports:
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./dashboard/templates:/app/dashboard/templates
      - ./dashboard/static:/app/dashboard/static
    environment:
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - QUANT_SYSTEM_API_KEY=${QUANT_SYSTEM_API_KEY:-}
      - APP_ENV=${APP_ENV:-development}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:-}
      - OPENCLAW_MANAGED=${OPENCLAW_MANAGED:-false}
      - OPENCLAW_AUTO_START=${OPENCLAW_AUTO_START:-false}
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-http://openclaw:18789}
      - OPENCLAW_WEB_URL=${OPENCLAW_WEB_URL:-}
      - QLIB_SERVICE_HOST=${QLIB_SERVICE_HOST:-0.0.0.0}
    depends_on:
      - openclaw
    restart: unless-stopped

  paper:
    build: .
    command: ["python", "scripts/run_paper.py", "-s", "dual_ma", "-c", "000001", "-c", "600519"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
    profiles:
      - trading

  live:
    build: .
    command: ["python", "scripts/run_live.py", "-s", "dual_ma", "-c", "000001"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
    profiles:
      - trading

  backtest:
    build: .
    command: ["python", "scripts/run_backtest.py", "-s", "dual_ma", "-c", "000001"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
    profiles:
      - trading
