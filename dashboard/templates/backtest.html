{% extends "base.html" %}
{% block title %}回测报告 - AI 量化交易系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>回测报告</h1>
</div>

<div class="card">
    <h2>回测参数</h2>
    <form id="backtest-form" class="form-row">
        <div class="form-group">
            <label>策略</label>
            <select id="strategy">
                <option value="dual_ma">双均线策略</option>
                <option value="bollinger">布林带策略</option>
                <option value="momentum">动量策略</option>
            </select>
        </div>
        <div class="form-group">
            <label>股票代码</label>
            <input type="text" id="code" value="000001" placeholder="如 000001">
        </div>
        <div class="form-group">
            <label>开始日期</label>
            <input type="date" id="start-date" value="2024-01-01">
        </div>
        <div class="form-group">
            <label>结束日期</label>
            <input type="date" id="end-date" value="2024-12-31">
        </div>
        <div class="form-group">
            <label>初始资金</label>
            <input type="number" id="cash" value="1000000">
        </div>
        <div class="form-group">
            <label>&nbsp;</label>
            <button type="submit" class="btn btn-primary" id="run-btn">运行回测</button>
        </div>
    </form>
</div>

<div id="results" style="display:none">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">总收益率</div>
            <div class="stat-value" id="r-return">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">年化收益</div>
            <div class="stat-value" id="r-annual">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">最大回撤</div>
            <div class="stat-value text-danger" id="r-dd">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">夏普比率</div>
            <div class="stat-value" id="r-sharpe">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">胜率</div>
            <div class="stat-value" id="r-winrate">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">交易次数</div>
            <div class="stat-value" id="r-trades">--</div>
        </div>
    </div>

    <div class="card">
        <h2>收益曲线</h2>
        <canvas id="equity-chart" height="80"></canvas>
    </div>

    <div class="card">
        <h2>交易明细</h2>
        <div class="table-wrap">
            <table id="trades-table">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>代码</th>
                        <th>方向</th>
                        <th>价格</th>
                        <th>数量</th>
                        <th>入场价</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let equityChart = null;

document.getElementById('backtest-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.textContent = '运行中...';

    const body = {
        strategy: document.getElementById('strategy').value,
        codes: [document.getElementById('code').value],
        start_date: document.getElementById('start-date').value,
        end_date: document.getElementById('end-date').value,
        initial_cash: parseFloat(document.getElementById('cash').value),
        enable_risk: false,
    };

    try {
        const res = await fetch('/api/backtest/run', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        const data = await res.json();
        showResults(data);
    } catch (err) {
        alert('回测失败: ' + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '运行回测';
    }
});

function showResults(data) {
    document.getElementById('results').style.display = '';
    document.getElementById('r-return').textContent = (data.total_return * 100).toFixed(2) + '%';
    document.getElementById('r-annual').textContent = (data.annual_return * 100).toFixed(2) + '%';
    document.getElementById('r-dd').textContent = (data.max_drawdown * 100).toFixed(2) + '%';
    document.getElementById('r-sharpe').textContent = data.sharpe_ratio;
    document.getElementById('r-winrate').textContent = (data.win_rate * 100).toFixed(1) + '%';
    document.getElementById('r-trades').textContent = data.total_trades;

    // 收益曲线
    if (equityChart) equityChart.destroy();
    const ctx = document.getElementById('equity-chart').getContext('2d');
    equityChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.equity_curve.map(p => p.date),
            datasets: [{
                label: '权益',
                data: data.equity_curve.map(p => p.equity),
                borderColor: '#4f8cff',
                backgroundColor: 'rgba(79,140,255,0.1)',
                fill: true,
                pointRadius: 0,
                borderWidth: 1.5,
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { display: true, ticks: { maxTicksLimit: 10 } },
                y: { display: true },
            }
        }
    });

    // 交易明细
    const tbody = document.querySelector('#trades-table tbody');
    tbody.innerHTML = data.trades.map(t => `<tr>
        <td>${t.datetime || '--'}</td>
        <td>${t.code}</td>
        <td class="${t.direction === 'long' ? 'text-success' : 'text-danger'}">${t.direction === 'long' ? '买入' : '卖出'}</td>
        <td>${t.price}</td>
        <td>${t.volume}</td>
        <td>${t.entry_price || '--'}</td>
    </tr>`).join('');
}
</script>
{% endblock %}
