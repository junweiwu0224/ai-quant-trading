{% extends "base.html" %}
{% block title %}风控面板 - AI 量化交易系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>风控面板</h1>
    <button class="btn btn-sm" onclick="loadData()">刷新</button>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-label">总权益</div>
        <div class="stat-value" id="equity">--</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">现金占比</div>
        <div class="stat-value" id="cash-pct">--</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">持仓数</div>
        <div class="stat-value" id="pos-count">--</div>
    </div>
</div>

<div class="card">
    <h2>仓位分布</h2>
    <canvas id="position-chart" height="60"></canvas>
</div>

<div class="card">
    <h2>风控规则</h2>
    <table>
        <thead>
            <tr><th>规则</th><th>阈值</th><th>状态</th></tr>
        </thead>
        <tbody>
            <tr><td>单票仓位上限</td><td>20%</td><td class="text-success">正常</td></tr>
            <tr><td>行业集中度</td><td>40%</td><td class="text-success">正常</td></tr>
            <tr><td>最大回撤止损</td><td>15%</td><td class="text-success">正常</td></tr>
            <tr><td>日亏损限额</td><td>3%</td><td class="text-success">正常</td></tr>
            <tr><td>固定止损</td><td>5%</td><td class="text-success">正常</td></tr>
            <tr><td>追踪止损</td><td>8%</td><td class="text-success">正常</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
let posChart = null;

async function loadData() {
    try {
        const res = await fetch('/api/portfolio/risk');
        const data = await res.json();
        document.getElementById('equity').textContent = '¥' + data.total_equity.toLocaleString();
        document.getElementById('cash-pct').textContent = (data.cash_pct * 100).toFixed(1) + '%';
        document.getElementById('pos-count').textContent = data.position_count;

        // 仓位分布饼图
        if (data.positions.length > 0) {
            const labels = data.positions.map(p => p.code);
            const values = data.positions.map(p => p.value);
            labels.push('现金');
            values.push(data.cash);

            if (posChart) posChart.destroy();
            const ctx = document.getElementById('position-chart').getContext('2d');
            posChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: ['#4f8cff', '#34d399', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#6b7280'],
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'right' } }
                }
            });
        }
    } catch (e) {
        console.log('无风控数据');
    }
}
loadData();
</script>
{% endblock %}
